name: Cross-post new articles to dev.to

on:
  workflow_dispatch:
    inputs:
      files:
        description: 'Space-separated post paths (e.g. content/post/foo.adoc)'
        required: true
  push:
    branches:
      - main
    paths:
      - 'content/post/**'

jobs:
  crosspost:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can diff HEAD~1..HEAD
          fetch-depth: 2

      - name: Install pandoc and asciidoctor
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc asciidoctor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Cross-post new articles to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.files }}" ]; then
            python scripts/devto_post.py ${{ github.event.inputs.files }}
          else
            python scripts/devto_post.py --new-in-commit
          fi
