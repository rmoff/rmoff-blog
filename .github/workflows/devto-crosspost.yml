name: Cross-post new articles to dev.to

on:
  push:
    branches:
      - main
    paths:
      - 'content/post/**'

jobs:
  crosspost:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can diff HEAD~1..HEAD
          fetch-depth: 2

      - name: Install pandoc
        run: |
          PANDOC_VER=3.6.4
          wget -q "https://github.com/jgm/pandoc/releases/download/${PANDOC_VER}/pandoc-${PANDOC_VER}-1-amd64.deb"
          sudo dpkg -i "pandoc-${PANDOC_VER}-1-amd64.deb"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Cross-post new articles to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: python scripts/devto_post.py --new-in-commit
