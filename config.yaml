baseURL: "https://rmoff.net"
languageCode : "en-us"
title: "rmoff's random ramblings"
pagination:
  pagerSize: 50
timeout: 120s
pygmentsStyle: pygments

params:
  AuthorName: Robin Moffatt
  GitHubUser: "rmoff"
  image: "images/2018/07/IMG_3647.jpg"
  # Medium → mirror rewriter. Flip mediumMirror to true when the mirror is back online.
  # Controls both the JS injection (layouts/_default/baseof.html) and the user-facing
  # bullet in the IL header (layouts/shortcodes/il-header.html).
  mediumMirror: false
  mediumMirrorBase: "https://freedium-mirror.cfd/"
  # Endpoint of the popular-links Cloudflare Worker (see workers/popular-links/).
  # Set to the deployed Worker URL, e.g. https://popular-links.<account>.workers.dev
  # Empty = the widget degrades gracefully to a "not configured" message.
  popularLinksEndpoint: "https://popular-links.steep-frost-bfed.workers.dev"
  # Old-school hit counter — same Worker, /views route (see workers/popular-links/).
  # Empty = the footer counter hides itself gracefully.
  hitCounterEndpoint: "https://popular-links.steep-frost-bfed.workers.dev"
permalinks:
  post: /:year/:month/:day/:title/

taxonomies:
  category: categories

outputs:
   home:
      - HTML
      - RSS
   page:
      - HTML
   section:
      - HTML
      - RSS
   taxonomy:
      - HTML
      - RSS
   term:
      - HTML
      - RSS

menu:
  main:
  - name: Categories
    url: /categories/
    weight: 1
  social:
  - name: linkedin
    title: "fab fa-linkedin"
    url: https://www.linkedin.com/in/robinmoffatt/
    weight: -10
  - name: twitter
    title: "fa-brands fa-x-twitter"
    url: https://twitter.com/rmoff/
    weight: -9
  - name: bluesky
    title: "fa-brands fa-bluesky"
    url: https://bsky.app/profile/rmoff.net
    weight: -8
  - name: youtube
    title: "fab fa-youtube-square"
    url: https://www.youtube.com/c/rmoff
    weight: -7
  - name: talks
    title: "fa-solid fa-chalkboard"
    url: https://talks.rmoff.net
    weight: -6
  - name: github
    title: "fab fa-github-square"
    url: https://github.com/rmoff/
    weight: -5

markup:
  asciidocExt:
    attributes:
      allow-uri-read: ""
      toc: ""
      toc-title: "Table of Contents"
      toc-placement: "auto"
      toclevels: "2"
      figure-caption!: ""
      source-highlighter: rouge
      icons: font
      rouge-css: style
      rouge-style: monokai
    extensions:
      - rouge_sql_jinja
    safeMode: unsafe
    workingFolderCurrent: true
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true

security:
  enableInlineShortcodes: false
  exec:
    allow:
    - ^dart-sass-embedded$
    - ^go$
    - ^npx$
    - ^postcss$
    - ^asciidoctor$
    osEnv:
    - (?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM)$
  funcs:
    getenv:
    - ^HUGO_
  http:
    methods:
    - (?i)GET|POST
    urls:
    - .*

module:
  mounts:
  - source: static
    target: assets
  - source: static
    target: static

ignoreErrors:
  - error-remote-getjson
